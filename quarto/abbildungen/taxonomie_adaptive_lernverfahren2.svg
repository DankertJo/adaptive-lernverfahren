<title>Taxonomie adaptiver Lernverfahren</title>
<desc>Wissenschaftliche Taxonomie adaptiver Lernverfahren mit den Hauptklassen Zustandsmodellierung und Adaptionsentscheidung. Ein dezenter schwarzer Sammelbalken zeigt, dass die Modellfamilien der Zustandsmodellierung eine Schätzung des Wissensstands liefern, die anschließend der Adaptionsentscheidung zugrunde liegt; die taxonomische Einordnung bleibt unverändert.</desc>
