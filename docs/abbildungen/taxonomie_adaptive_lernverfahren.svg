<text x="1485.0" y="631.3" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#111111">Selektionsverfahren</text>
<rect x="1160" y="700" width="650" height="100" fill="#FFFFFF" stroke="#111111" stroke-width="2" vector-effect="non-scaling-stroke"/>
