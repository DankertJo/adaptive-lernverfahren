<text x="1485.0" y="1051.3" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#111111">Sequenzplanung</text>
<rect x="1160" y="1120" width="650" height="100" fill="#FFFFFF" stroke="#111111" stroke-width="2" vector-effect="non-scaling-stroke"/>
<text x="1485.0" y="1158.0" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#111111">Sequentielle</text>
<text x="1485.0" y="1191.3" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#111111">Entscheidungsoptimierung</text>
<rect x="290" y="850" width="450" height="90" fill="#F2F6FA" stroke="#456F91" stroke-width="2.6" vector-effect="non-scaling-stroke"/>
